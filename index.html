<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diabetes Tracker</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --card: #ffffff;
        --ink: #16202a;
        --muted: #607080;
        --accent: #15806d;
        --line: #d9e2ea;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eff8f5, var(--bg));
        color: var(--ink);
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 18px 40px;
      }
      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 18px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 16px 30px rgba(10, 29, 42, 0.05);
      }
      input, textarea, button { width: 100%; font: inherit; }
      input, textarea {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        margin-top: 8px;
      }
      textarea { min-height: 88px; }
      button {
        margin-top: 12px;
        border-radius: 14px;
        border: none;
        padding: 12px;
        cursor: pointer;
        background: var(--accent);
        color: white;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .summary-box {
        padding: 14px;
        border-radius: 16px;
        background: #f3fbf9;
        border: 1px solid #d7efe8;
      }
      .bars {
        display: flex;
        align-items: end;
        gap: 12px;
        min-height: 220px;
        margin-top: 16px;
      }
      .bar-wrap {
        flex: 1;
        text-align: center;
      }
      .bar {
        width: 100%;
        border-radius: 12px 12px 0 0;
        background: linear-gradient(180deg, #43b39d, #15806d);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 14px;
      }
      th, td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        font-size: 0.94rem;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .muted { color: var(--muted); }
      @media (max-width: 920px) {
        .layout, .summary-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="muted">Diabetes Tracker</p>
      <h1>Log readings and track daily trends.</h1>
      <div class="layout">
        <section class="card">
          <h2>New entry</h2>
          <label>Glucose</label>
          <input id="glucose" type="number" min="40" max="500" value="110" />
          <label>Meal</label>
          <input id="meal" type="text" placeholder="Breakfast, Lunch, Snack..." />
          <label>Exercise minutes</label>
          <input id="exercise" type="number" min="0" max="600" value="0" />
          <label>Notes</label>
          <textarea id="notes" placeholder="Optional notes"></textarea>
          <button id="saveButton">Save entry</button>
          <a href="/api/export/csv" style="display:block; margin-top:12px;">Export CSV</a>
          <p id="status" class="muted"></p>
        </section>

        <section class="card">
          <div class="toolbar">
            <div>
              <h2 style="margin-bottom: 4px;">Dashboard</h2>
              <p class="muted" style="margin-top: 0;">Today summary plus recent trend view</p>
            </div>
          </div>

          <div class="summary-grid">
            <div class="summary-box"><div class="muted">Entries today</div><strong id="entriesToday">-</strong></div>
            <div class="summary-box"><div class="muted">Average</div><strong id="avgToday">-</strong></div>
            <div class="summary-box"><div class="muted">Min</div><strong id="minToday">-</strong></div>
            <div class="summary-box"><div class="muted">Max</div><strong id="maxToday">-</strong></div>
          </div>

          <div class="bars" id="trendBars"></div>

          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Glucose</th>
                <th>Meal</th>
                <th>Exercise</th>
              </tr>
            </thead>
            <tbody id="entriesTable"></tbody>
          </table>
        </section>
      </div>
    </main>

    <script>
      async function loadDashboard() {
        const entriesRes = await fetch("/api/entries");
        const entries = await entriesRes.json();
        const summaryRes = await fetch("/api/summary/recent?days=7");
        const summary = await summaryRes.json();
        const todayRes = await fetch("/api/summary/today");
        const today = todayRes.ok ? await todayRes.json() : null;

        document.getElementById("entriesToday").textContent = today ? today.total_entries : 0;
        document.getElementById("avgToday").textContent = today ? today.average_glucose : "-";
        document.getElementById("minToday").textContent = today ? today.min_glucose : "-";
        document.getElementById("maxToday").textContent = today ? today.max_glucose : "-";

        document.getElementById("entriesTable").innerHTML = entries.map((entry) => `
          <tr>
            <td>${entry.created_at.replace("T", " ")}</td>
            <td>${entry.glucose}</td>
            <td>${entry.meal || "-"}</td>
            <td>${entry.exercise_minutes} min</td>
          </tr>
        `).join("");

        const bars = summary.daily_summaries.slice().reverse();
        document.getElementById("trendBars").innerHTML = bars.map((day) => {
          const height = Math.max(20, Math.min(180, day.average_glucose));
          return `
            <div class="bar-wrap">
              <div class="bar" style="height:${height}px;"></div>
              <div>${day.average_glucose}</div>
              <div class="muted">${day.date.slice(5)}</div>
            </div>
          `;
        }).join("");
      }

      async function saveEntry() {
        const payload = {
          glucose: Number(document.getElementById("glucose").value),
          meal: document.getElementById("meal").value || null,
          exercise_minutes: Number(document.getElementById("exercise").value || 0),
          notes: document.getElementById("notes").value || null,
        };

        const response = await fetch("/api/entries", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const status = document.getElementById("status");
        if (!response.ok) {
          status.textContent = "Could not save the entry.";
          return;
        }

        status.textContent = "Entry saved.";
        document.getElementById("meal").value = "";
        document.getElementById("notes").value = "";
        document.getElementById("exercise").value = "0";
        await loadDashboard();
      }

      document.getElementById("saveButton").addEventListener("click", saveEntry);
      loadDashboard();
    </script>
  </body>
</html>
